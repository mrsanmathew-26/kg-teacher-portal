<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birla Public School – KG Teacher Portal v2.0</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0C7E6A;--teal2:#0a6657;--teal-l:#E1F5EE;--teal-m:#9FE1CB;
  --coral:#D85A30;--coral-l:#FAECE7;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --green:#3B6D11;--green-l:#EAF3DE;
  --gray:#5F5E5A;--gray-l:#F1EFE8;--gray-m:#D3D1C7;--gray-d:#2C2C2A;
  --ff:'Nunito',sans-serif;--radius:12px;--radius-sm:8px;
  --shadow:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:var(--ff);background:#ECEAE3;color:var(--gray-d);font-size:14px}
/* TOPBAR */
.topbar{background:var(--teal);height:56px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.tb-name{font-size:14px;font-weight:900;color:#fff;line-height:1.3}
.tb-sub{font-size:10px;color:var(--teal-m);font-weight:700}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:var(--teal-m);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--teal2);font-size:12px;flex-shrink:0}
.tb-uname{font-size:12px;font-weight:800;color:#fff}
.tb-urole{font-size:10px;color:var(--teal-m)}
.tb-signout{font-family:var(--ff);font-size:11px;font-weight:700;padding:5px 11px;border-radius:6px;border:none;cursor:pointer;background:rgba(255,255,255,.18);color:#fff}
.tb-signout:hover{background:rgba(255,255,255,.28)}
/* LAYOUT */
.main-wrap{display:flex;height:calc(100vh - 56px)}
.sidebar{width:208px;background:#fff;border-right:1px solid var(--gray-m);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-sect{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);padding:14px 18px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:12px;font-weight:700;color:var(--gray);cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.sb-item:hover{background:var(--gray-l);color:var(--gray-d)}
.sb-item.active{background:var(--teal-l);color:var(--teal);border-left-color:var(--teal)}
.sb-item .ic{font-size:15px;width:20px;text-align:center}
.sb-divider{height:1px;background:var(--gray-m);margin:8px 14px}
.sb-bottom{margin-top:auto;border-top:1px solid var(--gray-m)}
.content-area{flex:1;overflow-y:auto;padding:22px 24px;background:#ECEAE3}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#d8f0e8 0%,#eceae3 100%)}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;width:420px;box-shadow:0 10px 48px rgba(0,0,0,.13);text-align:center}
.login-logo{width:68px;height:68px;background:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px}
.login-title{font-size:21px;font-weight:900;color:var(--gray-d);margin-bottom:3px}
.login-sub{font-size:12px;color:var(--gray);margin-bottom:6px}
.demo-badge{display:inline-block;background:var(--amber-l);color:var(--amber);font-size:10px;font-weight:800;padding:3px 12px;border-radius:20px;margin-bottom:22px}
.lf label{display:block;font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;text-align:left}
.lf select,.lf input{width:100%;padding:9px 12px;border:1.5px solid var(--gray-m);border-radius:var(--radius-sm);font-family:var(--ff);font-size:13px;background:var(--gray-l);color:var(--gray-d);transition:border .15s;margin-bottom:13px}
.lf select:focus,.lf input:focus{outline:none;border-color:var(--teal)}
.login-preview{background:var(--teal-l);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;text-align:left;margin-bottom:14px;line-height:1.9;color:var(--gray-d)}
.login-btn{width:100%;padding:11px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--ff);font-size:14px;font-weight:800;cursor:pointer;transition:background .15s;margin-top:4px}
.login-btn:hover{background:var(--teal2)}
.login-ms{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:9px;background:#fff;border:1.5px solid var(--gray-m);border-radius:var(--radius-sm);font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;margin-top:9px;color:var(--gray-d);transition:background .15s}
.login-ms:hover{background:var(--gray-l)}
/* SHARED */
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.page-title{font-size:19px;font-weight:900;color:var(--gray-d)}
.page-sub{font-size:12px;color:var(--gray);margin-top:2px}
.card{background:#fff;border-radius:var(--radius);padding:18px;border:1px solid var(--gray-m);margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:800;color:var(--teal);margin-bottom:12px;display:flex;align-items:center;gap:6px}
/* BUTTONS */
.btn{font-family:var(--ff);font-size:11px;font-weight:800;padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-teal{background:var(--teal);color:#fff}
.btn-teal:hover:not(:disabled){background:var(--teal2)}
.btn-outline{background:#fff;color:var(--teal);border:1.5px solid var(--teal)}
.btn-outline:hover:not(:disabled){background:var(--teal-l)}
.btn-gray{background:var(--gray-l);color:var(--gray);border:1.5px solid var(--gray-m)}
.btn-purple{background:var(--purple-l);color:var(--purple);border:1.5px solid var(--purple)}
.btn-coral{background:var(--coral-l);color:var(--coral);border:1.5px solid var(--coral)}
.btn-amber{background:var(--amber-l);color:var(--amber);border:1.5px solid var(--amber)}
/* BADGES */
.badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px}
.badge-teal{background:var(--teal-l);color:var(--teal)}
.badge-coral{background:var(--coral-l);color:var(--coral)}
.badge-amber{background:var(--amber-l);color:var(--amber)}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-gray{background:var(--gray-l);color:var(--gray)}
.badge-purple{background:var(--purple-l);color:var(--purple)}
.status-draft{background:var(--amber-l);color:var(--amber)}
.status-review{background:var(--blue-l);color:var(--blue)}
.status-final{background:var(--green-l);color:var(--green)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.22);animation:slideUp .25s ease}
.toast-success{background:var(--teal)}
.toast-error{background:var(--coral)}
.toast-info{background:var(--blue)}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
/* FORM */
.fl{display:block;font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fi,.fs,.fta{width:100%;padding:8px 11px;border:1.5px solid var(--gray-m);border-radius:var(--radius-sm);font-family:var(--ff);font-size:13px;background:var(--gray-l);color:var(--gray-d);transition:border .15s}
.fta{resize:vertical}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--teal);background:var(--teal-l)}
.fg{margin-bottom:12px}
.ph{font-size:9px;font-weight:700;background:var(--purple-l);color:var(--purple);padding:1px 6px;border-radius:3px;margin-left:5px;font-family:monospace}
.req{color:var(--coral);font-weight:900;margin-left:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
/* FORM BLOCKS */
.fb{background:#fff;border-radius:var(--radius);padding:18px 20px;margin-bottom:13px;border:1px solid var(--gray-m);box-shadow:var(--shadow)}
.fb-title{font-size:11px;font-weight:900;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--teal-l);display:flex;align-items:center;gap:7px}
/* FORM TABS */
.ftabs{display:flex;gap:3px;background:var(--gray-l);padding:4px;border-radius:var(--radius-sm);margin-bottom:14px;overflow-x:auto}
.ftab{flex:1;padding:7px 10px;font-family:var(--ff);font-size:11px;font-weight:800;border:none;border-radius:6px;background:transparent;color:var(--gray);cursor:pointer;transition:all .15s;white-space:nowrap}
.ftab.active{background:#fff;color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* DAY ROW */
.day-row{background:var(--gray-l);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:10px;border-left:4px solid var(--teal)}
.day-lbl{font-size:12px;font-weight:900;color:var(--teal);margin-bottom:9px}
/* DIFF */
.diff-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.diff-card{border-radius:var(--radius-sm);padding:12px;border:1.5px solid}
.d-high{background:#f0fff4;border-color:#48bb78}
.d-med{background:#fffbeb;border-color:#ecc94b}
.d-low{background:#fff5f5;border-color:#fc8181}
.d-lbl{font-size:11px;font-weight:900;margin-bottom:8px}
.d-ta{width:100%;padding:7px 9px;border:1.5px solid;border-radius:6px;font-family:var(--ff);font-size:12px;resize:vertical;background:transparent}
.d-high .d-ta{border-color:#48bb78}
.d-med .d-ta{border-color:#ecc94b}
.d-low .d-ta{border-color:#fc8181}
.d-ta:focus{outline:none}
/* EXPORT BAR */
.xbar{background:#fff;border-radius:var(--radius);padding:13px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border:1px solid var(--gray-m);margin-top:18px;box-shadow:0 -2px 12px rgba(0,0,0,.06);position:sticky;bottom:0}
/* PLAN LIST */
.plan-item{background:#fff;border-radius:var(--radius-sm);padding:13px 16px;border:1px solid var(--gray-m);display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:9px;cursor:pointer;transition:all .14s;box-shadow:var(--shadow)}
.plan-item:hover{border-color:var(--teal);background:var(--teal-l)}
.plan-name{font-size:13px;font-weight:800;color:var(--gray-d)}
.plan-meta{font-size:11px;color:var(--gray);margin-top:2px}
/* TEMPLATE GRID */
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.tmpl-card{background:#fff;border:2px solid var(--gray-m);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all .16s;text-align:center;box-shadow:var(--shadow)}
.tmpl-card:hover{border-color:var(--teal);background:var(--teal-l);transform:translateY(-2px)}
.tmpl-card.sel{border-color:var(--teal);background:var(--teal-l)}
.tmpl-icon{font-size:34px;margin-bottom:8px}
.tmpl-name{font-size:12px;font-weight:800;color:var(--gray-d);margin-bottom:3px}
.tmpl-desc{font-size:10px;color:var(--gray);margin-bottom:7px}
/* ATTENDANCE */
.att-tbl{width:100%;border-collapse:collapse;font-size:12px}
.att-tbl th{background:var(--teal);color:#fff;padding:8px 10px;font-size:10px;font-weight:800;text-align:center}
.att-tbl th:first-child{text-align:left;padding-left:14px}
.att-tbl td{padding:7px 10px;border-bottom:1px solid var(--gray-m);text-align:center;vertical-align:middle}
.att-tbl td:first-child{text-align:left;padding-left:14px;font-weight:700;font-size:12px}
.att-tbl tr:hover td{background:var(--teal-l)}
.att-btn{padding:4px 11px;border-radius:5px;font-size:10px;font-weight:800;cursor:pointer;border:none;font-family:var(--ff)}
.att-P{background:var(--green-l);color:var(--green)}
.att-A{background:var(--coral-l);color:var(--coral)}
.att-L{background:var(--amber-l);color:var(--amber)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:500}
.modal{background:#fff;border-radius:var(--radius);padding:24px;width:min(92vw,700px);max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.25)}
.modal-hdr{font-size:15px;font-weight:900;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;font-size:20px;color:var(--gray);line-height:1}
.ptbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.ptbl th{background:var(--teal);color:#fff;padding:6px 8px;text-align:left;font-size:10px}
.ptbl td{padding:6px 8px;border-bottom:1px solid var(--gray-m);vertical-align:top}
.ptbl tr:nth-child(even) td{background:var(--gray-l)}
.psect h3{font-size:12px;font-weight:900;color:var(--teal);margin:12px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--teal-l)}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:var(--radius-sm);padding:14px 16px;border:1px solid var(--gray-m);box-shadow:var(--shadow)}
.stat-num{font-size:26px;font-weight:900}
.stat-lbl{font-size:10px;color:var(--gray);font-weight:700;margin-top:1px}
/* ACTIVITY CHIPS */
.chip-pool{display:flex;flex-wrap:wrap;gap:7px;padding:12px;background:var(--gray-l);border-radius:var(--radius-sm);min-height:56px;border:2px dashed var(--gray-m);margin-bottom:10px}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid;user-select:none;transition:all .12s}
.chip:hover{transform:scale(1.05)}
/* HELP */
.help-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.help-card{background:#fff;border-radius:var(--radius-sm);padding:14px 16px;border:1px solid var(--gray-m);box-shadow:var(--shadow)}
.help-card h4{font-size:13px;font-weight:800;color:var(--teal);margin-bottom:6px}
.help-card p,.help-card li{font-size:12px;color:var(--gray);line-height:1.7}
.help-card ul{padding-left:16px}
.fgtbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.fgtbl th{background:var(--teal);color:#fff;padding:7px 10px;text-align:left;font-size:11px}
.fgtbl td{padding:7px 10px;border-bottom:1px solid var(--gray-m)}
.fgtbl tr:nth-child(even) td{background:var(--gray-l)}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--gray-m);border-radius:3px}
/* PRINT */
@media print{.topbar,.sidebar,.xbar,.ftabs,.btn,.no-print{display:none!important}.main-wrap{display:block}.content-area{padding:0}.card{box-shadow:none;break-inside:avoid}}
@media(max-width:768px){.sidebar{display:none}.stats-grid{grid-template-columns:1fr 1fr}.g2,.g3,.g4,.diff-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ═══════════════════════════════════════════
   DOCX GENERATOR  — matches uploaded template
═══════════════════════════════════════════ */
async function generateDocx(form) {
  const {
    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign, UnderlineType
  } = docx;

  const T='1F7A6E',LT='E0F0EE',LB='D5E8F0',LY='FFF9E6',LP='FDF0F5',
        W='FFFFFF',DG='2C2C2A',MG='888780',LG='F5F5F3';
  const b0={style:BorderStyle.NONE,size:0,color:'FFFFFF'};
  const bt=(c='CCCCCC')=>({style:BorderStyle.SINGLE,size:6,color:c});
  const bAll=(c='CCCCCC')=>({top:bt(c),bottom:bt(c),left:bt(c),right:bt(c)});
  const b0All={top:b0,bottom:b0,left:b0,right:b0};
  const cm={top:80,bottom:80,left:120,right:120};
  const cs={top:55,bottom:55,left:100,right:100};

  const R=(t,o={})=>new TextRun({text:t,font:'Arial',size:20,color:DG,...o});
  const Rb=(t,o={})=>R(t,{bold:true,...o});
  const Ri=(t,o={})=>R(t,{italics:true,...o});
  const Ru=(t,o={})=>R(t,{bold:true,underline:{type:UnderlineType.SINGLE},...o});
  const P=(r,o={})=>new Paragraph({children:Array.isArray(r)?r:[r],spacing:{after:60},...o});
  const Pg=()=>new Paragraph({children:[R('',{size:8})],spacing:{after:0}});

  const Cell=(ch,fill=W,opts={})=>new TableCell({
    borders:bAll('CCCCCC'),shading:{fill,type:ShadingType.CLEAR},
    margins:cm,verticalAlign:VerticalAlign.TOP,
    children:Array.isArray(ch)?ch:[ch],...opts
  });
  const HCell=(t,fill=T,opts={})=>new TableCell({
    borders:bAll(T),shading:{fill,type:ShadingType.CLEAR},margins:cm,
    verticalAlign:VerticalAlign.CENTER,
    children:[P([Rb(t,{color:W,size:19})],{alignment:AlignmentType.CENTER})],...opts
  });
  const W_=10466;

  const doc=new Document({
    sections:[{
      properties:{page:{size:{width:11906,height:16838},margin:{top:720,right:720,bottom:720,left:720}}},
      children:[
        // ── SCHOOL HEADER
        new Table({width:{size:W_,type:WidthType.DXA},columnWidths:[W_],rows:[
          new TableRow({children:[new TableCell({
            borders:bAll(T),shading:{fill:T,type:ShadingType.CLEAR},
            margins:{top:140,bottom:140,left:200,right:200},
            children:[
              P([Rb('Birla Public School, Doha – Qatar',{size:28,color:W})],{alignment:AlignmentType.CENTER}),
              P([Rb('Kindergarten Curriculum Plan',{size:22,color:W})],{alignment:AlignmentType.CENTER}),
              P([Rb('Lesson Plan 2025 – 26',{size:20,color:W})],{alignment:AlignmentType.CENTER}),
            ]
          })]}),
        ]}),
        Pg(),
        // ── INFO ROW
        new Table({width:{size:W_,type:WidthType.DXA},columnWidths:[2400,1400,4266,2400],rows:[
          new TableRow({children:[
            Cell([P([Rb('From: ',{size:18}),R(`${form.dateFrom} to ${form.dateTo} ${form.month}`,{size:18})])],LB),
            Cell([P([Rb('Grade: ',{size:18}),Rb(form.grade,{size:18})])],LB),
            Cell([P([Rb("Teacher's Name: ",{size:18}),R(form.teacherName,{size:18})])],LB),
            Cell([P([Rb('Subject: ',{size:18}),Rb(form.subject,{size:18})])],LB),
          ]}),
          new TableRow({children:[
            new TableCell({columnSpan:3,borders:bAll('CCCCCC'),shading:{fill:LY,type:ShadingType.CLEAR},margins:cm,
              children:[P([Rb('Theme: ',{size:18}),R(form.theme,{size:18}),Rb('     Topic: ',{size:18}),R(form.topic,{size:18})])]}),
            Cell([P([Rb('No. of Periods: ',{size:18}),Rb(form.periods,{size:18})])],LY),
          ]}),
        ]}),
        Pg(),
        // ── RESOURCES / VOCAB / FEEDBACK
        new Table({width:{size:W_,type:WidthType.DXA},columnWidths:[W_],rows:[
          new TableRow({children:[new TableCell({
            borders:bAll(T),shading:{fill:LT,type:ShadingType.CLEAR},margins:cs,
            children:[
              P([Rb('Learning Resources',{color:T,size:20})]),
              ...form.resources.filter(r=>r.trim()).map((r,i)=>P([R(`${i+1}.  ${r}`,{size:18})],{indent:{left:200}})),
              form.websiteLinks?P([Rb('Website Links: ',{color:T,size:18}),R(form.websiteLinks,{size:18,color:'1155CC'})]):Pg(),
              form.interactiveGames?P([Rb('Interactive Games: ',{color:T,size:18}),R(form.interactiveGames,{size:18})]):Pg(),
            ]
          })]}),
          new TableRow({children:[new TableCell({
            borders:bAll('CCCCCC'),margins:cm,
            children:[P([Rb('New Terminology / Vocabulary: ',{color:T,size:19}),R(form.vocabulary,{size:18})])]
          })]}),

/* ── FORM VALIDATION ── */
function validateForm(form){
  const errs=[];
  if(!form.teacherName.trim()) errs.push('Teacher Name');
  if(!form.dateFrom.trim())    errs.push('Date From');
  if(!form.dateTo.trim())      errs.push('Date To');
  if(!form.month.trim())       errs.push('Month & Year');
  if(!form.theme.trim())       errs.push('Theme');
  if(!form.topic.trim())       errs.push('Topic');
  if(!form.vocabulary.trim())  errs.push('Vocabulary');
  if(!form.objectives.some(o=>o.trim())) errs.push('At least 1 Objective');
  if(!form.diffHigh.trim())    errs.push('Differentiation – High');
  if(!form.diffMed.trim())     errs.push('Differentiation – Medium');
  if(!form.diffLow.trim())     errs.push('Differentiation – Low');
  return errs;
}

/* ── WEEK AUTO-CALCULATOR ── */
function getWeekLabel(){
  const schoolStart=new Date('2025-09-01');
  const now=new Date();
  const diff=Math.floor((now-schoolStart)/(7*24*60*60*1000));
  return diff>=0?`Week ${diff+1}`:'Week 1';
}
function getTodayMonth(){
  return new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'});
}

function useToast(){
  const [toast,setToast]=useState(null);

  return {toast,show};
}

function Toast({toast,onDone}){
  useEffect(()=>{if(toast){const t=setTimeout(onDone,3200);return()=>clearTimeout(t);}},[toast]);
  if(!toast)return null;
  return <div className={`toast toast-${toast.type}`}>{toast.msg}</div>;
}

/* ── LESSON PLAN FORM ── */
function LessonForm({user,onBack,show}){
  const initForm={...emptyForm(),teacherName:user.name,grade:user.grade,subject:user.subject,
    month:getTodayMonth(),weekLabel:getWeekLabel()};
  const [form,setForm]=useState(()=>{
    const draft=lsGet('bps_draft_'+user.initials,null);
    return draft||initForm;
  });
  const [tab,setTab]=useState(0);
  const [preview,setPreview]=useState(false);
  const [busy,setBusy]=useState(false);
  const [errors,setErrors]=useState([]);
  const [lastSaved,setLastSaved]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setDay=(i,k,v)=>setForm(f=>{const s=[...f.schedule];s[i]={...s[i],[k]:v};return{...f,schedule:s}});
  const setObj=(i,v)=>setForm(f=>{const o=[...f.objectives];o[i]=v;return{...f,objectives:o}});
  const setRes=(i,v)=>setForm(f=>{const r=[...f.resources];r[i]=v;return{...f,resources:r}});

  // Auto-save draft every 30s
  useEffect(()=>{
    const t=setInterval(()=>{
      lsSet('bps_draft_'+user.initials,form);
      setLastSaved(new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
    },30000);
    return()=>clearInterval(t);
  },[form]);

  const exportDocx=async(mode)=>{
    const errs=validateForm(form);
    if(errs.length&&mode!=='word'&&mode!=='onedrive'){
      setErrors(errs);
      show('⚠ Please fill required fields: '+errs.slice(0,3).join(', ')+(errs.length>3?'...':''),'error');
      setTab(0);
      return;
    }
    setErrors([]);
    setBusy(true);
    try{
      const buf=await generateDocx(form);
      const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      const fname=`LessonPlan_${form.grade}_${(form.theme||'Plan').replace(/\s+/g,'_')}.docx`;
      if(mode==='word'){show('🌐 In production: opens in Word Online via SharePoint link','info');}
      else if(mode==='onedrive'){show('☁ In production: saved to OneDrive /LessonPlans/'+form.grade+'/','info');}
      else{
        // Save to localStorage plans list
        const plans=lsGet(LS_KEY,[]);
        const newPlan={id:Date.now(),title:`${form.theme} – ${form.subject}`,
          date:`${form.dateFrom}–${form.dateTo} ${form.month}`,
          grade:form.grade,subject:form.subject,status:mode==='final'?'final':'draft',form};
        lsSet(LS_KEY,[newPlan,...plans.filter(p=>p.id!==newPlan.id)].slice(0,20));
        if(mode==='final'){
          lsSet('bps_draft_'+user.initials,null);
        }
        saveAs(blob,fname);
        show('✅ DOCX downloaded: '+fname);
      }

      {/* PREVIEW MODAL */}

        <div className="modal-overlay" onClick={()=>setPreview(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>

              <span>📄 Lesson Plan Preview</span>
              <span className="modal-close" onClick={()=>setPreview(false)}>✕</span>

      {errors.length>0&&(

      <div className="xbar">
        <button className="btn btn-gray" onClick={onBack}>← Back</button>

      </div>
    </div>
  );
}

/* ── LESSON PLANS TAB ── */
function PlansTab({user,show}){
  const [view,setView]=useState('list');
  const [selTmpl,setSelTmpl]=useState(null);
  const [gf,setGf]=useState('ALL');
  const [plans,setPlans]=useState(()=>{
    const saved=lsGet(LS_KEY,[]);
    return saved.length?saved:SAVED_PLANS;
  });
  const filtered=TEMPLATES.filter(t=>gf==='ALL'||t.grade===gf||t.grade==='BOTH');

  const deletePlan=(id)=>{
    const updated=plans.filter(p=>p.id!==id);
    setPlans(updated);
    lsSet(LS_KEY,updated);
    show('🗑 Plan deleted');
  };

  if(view==='form')return<LessonForm user={user} onBack={()=>{setView('list');setPlans(lsGet(LS_KEY,SAVED_PLANS));}} show={show}/>;

  if(view==='tmpl')return(
    <div>
      <div className="page-hdr">
        <div><div className="page-title">Choose a Template</div><div className="page-sub">Select the plan format for your class</div></div>
        <button className="btn btn-gray" onClick={()=>setView('list')}>← Back</button>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:14}}>
        {['ALL','KG1','KG2'].map(g=><button key={g} className={`btn ${gf===g?'btn-teal':'btn-gray'}`} onClick={()=>setGf(g)}>{g}</button>)}
      </div>
      <div className="tmpl-grid">
        {filtered.map(t=>(
          <div key={t.id} className={`tmpl-card${selTmpl?.id===t.id?' sel':''}`} onClick={()=>setSelTmpl(t)}>
            <div className="tmpl-icon">{t.icon}</div>
            <div className="tmpl-name">{t.name}</div>
            <div className="tmpl-desc">{t.desc}</div>
            <span className="badge badge-teal">{t.grade}</span>
          </div>
        ))}
      </div>
      <div className="xbar">
        <button className="btn btn-gray" onClick={()=>setView('list')}>← Back</button>
        <button className="btn btn-teal" disabled={!selTmpl} onClick={()=>setView('form')}>
          Use: {selTmpl?.name||'Select a template'} →
        </button>
      </div>
    </div>
  );

  return(
    <div>
      <div className="page-hdr">
        <div>
          <div className="page-title">Lesson Plans</div>
          <div className="page-sub">Your saved and draft plans — {plans.length} total</div>
        </div>
        <button className="btn btn-teal" onClick={()=>setView('tmpl')}>+ New Plan</button>
      </div>
      {plans.length===0&&(
        <div style={{textAlign:'center',padding:'48px 24px',background:'#fff',borderRadius:'var(--radius)',border:'1px solid var(--gray-m)'}}>
          <div style={{fontSize:40,marginBottom:12}}>📋</div>
          <div style={{fontWeight:800,color:'var(--gray-d)',marginBottom:6}}>No lesson plans yet</div>
          <div style={{fontSize:12,color:'var(--gray)',marginBottom:16}}>Create your first plan using a template</div>
          <button className="btn btn-teal" onClick={()=>setView('tmpl')}>+ Create First Plan</button>
        </div>
      )}
      {plans.map(p=>(
        <div key={p.id} className="plan-item">
          <div style={{flex:1}}>
            <div className="plan-name">{p.title}</div>
            <div className="plan-meta">{p.date} · Grade {p.grade} · {p.subject}</div>
          </div>
          <div style={{display:'flex',gap:7,alignItems:'center'}}>
            <span className={`badge status-${p.status||'draft'}`}>{p.status||'draft'}</span>
            <button className="btn btn-outline" style={{padding:'5px 10px',fontSize:10}} onClick={async()=>{
              show('⏳ Generating DOCX...','info');
              const f=p.form||{...emptyForm(),teacherName:user.name,grade:p.grade,subject:p.subject,
                theme:p.title,topic:'Lesson',dateFrom:'',dateTo:'',month:getTodayMonth(),
                periods:'5',objectives:['See lesson plan']};
              const buf=await generateDocx(f);
              const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
              saveAs(blob,`${(p.title||'Plan').replace(/\s+/g,'_')}.docx`);
              show('✅ DOCX downloaded!');
            }}>⬇ DOCX</button>
            <button className="btn btn-gray" style={{padding:'5px 10px',fontSize:10}} onClick={()=>deletePlan(p.id)}>🗑</button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── ATTENDANCE TAB ── */
function AttendanceTab({show}){
  const [students,setStudents]=useState(()=>lsGet(LS_ATT,MOCK_STUDENTS));
  const cols=['Sun','Mon','Tue','Wed','Thu'];
  const toggle=(id,day)=>setStudents(ss=>ss.map(s=>{
    if(s.id!==id)return s;
    const nx=s.att[day]==='P'?'A':s.att[day]==='A'?'L':'P';
    return{...s,att:{...s.att,[day]:nx}};
  }));
  const sum=day=>({P:students.filter(s=>s.att[day]==='P').length,A:students.filter(s=>s.att[day]==='A').length,L:students.filter(s=>s.att[day]==='L').length});
  return(
    <div>
      <div className="page-hdr">
        <div><div className="page-title">Attendance Register</div><div className="page-sub">Click any cell to toggle P → A → L · Grade KG2 – Section A</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline" onClick={()=>show('📊 Attendance report exported','info')}>Export CSV</button>
          <button className="btn btn-teal" onClick={()=>{lsSet(LS_ATT,students);show('✅ Attendance saved!')}}>Save Today</button>
        </div>
      </div>
      <div className="card" style={{padding:0,overflow:'auto'}}>
        <table className="att-tbl">
          <thead><tr>
            <th style={{textAlign:'left',paddingLeft:14}}>Student</th>
            <th>Level</th>
            {cols.map(d=><th key={d}>{d}</th>)}
            <th>Present</th>
          </tr></thead>
          <tbody>
            {students.map(s=>{
              const pc=Object.values(s.att).filter(v=>v==='P').length;
              return(
                <tr key={s.id}>
                  <td style={{fontWeight:700,fontSize:12}}>{s.name}</td>
                  <td><span className={`badge ${s.level==='H'?'badge-green':s.level==='M'?'badge-amber':'badge-coral'}`}>{s.level}</span></td>
                  {cols.map(d=><td key={d}><button className={`att-btn att-${s.att[d]}`} onClick={()=>toggle(s.id,d)}>{s.att[d]}</button></td>)}
                  <td style={{fontWeight:800,color:pc>=4?'var(--green)':'var(--coral)'}}>{pc}/5</td>
                </tr>
              );
            })}
            <tr className="att-summary">
              <td colSpan={2} style={{fontWeight:800,paddingLeft:14,background:'var(--gray-l)'}}>Summary</td>
              {cols.map(d=>{const{P,A,L}=sum(d);return<td key={d} style={{fontSize:10,background:'var(--gray-l)'}}>
                <span style={{color:'var(--green)'}}>P:{P}</span> <span style={{color:'var(--coral)'}}>A:{A}</span> <span style={{color:'var(--amber)'}}>L:{L}</span>
              </td>})}
              <td style={{background:'var(--gray-l)'}}></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{fontSize:11,color:'var(--gray)',marginTop:8}}>
        🟢 P = Present &nbsp;·&nbsp; 🔴 A = Absent &nbsp;·&nbsp; 🟡 L = Late &nbsp;·&nbsp; Level: H = High · M = Mid · L = Low achiever
      </div>
    </div>
  );
}

/* ── REPORT CARDS TAB ── */
function ReportsTab({user,show}){
  const subjects=['Literacy','Numeracy','Art','P.E.','General Studies'];
  const [grades,setGrades]=useState(()=>{
    const saved=lsGet(LS_GRADES,null);
    if(saved)return saved;
    const g={};
    MOCK_STUDENTS.forEach(s=>{g[s.id]={};subjects.forEach(sub=>{g[s.id][sub]='';});});
    return g;
  });
  const setG=(sid,sub,val)=>setGrades(g=>{
    const updated={...g,[sid]:{...g[sid],[sub]:val}};
    lsSet(LS_GRADES,updated);
    return updated;
  });
  return(
    <div>
      <div className="page-hdr">
        <div><div className="page-title">Report Cards</div><div className="page-sub">Enter grades per subject — export as DOCX for each student</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline" onClick={()=>show('📋 All report cards exported as one PDF (production)','info')}>Export All PDF</button>
          <button className="btn btn-teal" onClick={async()=>{
            show('⏳ Generating sample report DOCX...','info');
            const f={...emptyForm(),teacherName:user.name,grade:user.grade,subject:'End of Term Report',
              theme:'Student Progress Report',topic:'Term 2 2025',dateFrom:'',dateTo:'',month:'May 2025',
              objectives:subjects.map(s=>`${s}: ${Object.values(grades).map(g=>g[s]).filter(Boolean)[0]||'—'}`)};
            const buf=await generateDocx(f);
            const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
            saveAs(blob,'ReportCard_KG2_Term2.docx');
            show('✅ Report Card DOCX downloaded!');
          }}>⬇ Export DOCX</button>
        </div>
      </div>
      <div style={{fontSize:11,color:'var(--amber)',background:'var(--amber-l)',padding:'8px 14px',borderRadius:'var(--radius-sm)',marginBottom:14}}>
        💡 Grade scale: <strong>A</strong> = Outstanding &nbsp; <strong>B</strong> = Good &nbsp; <strong>C</strong> = Developing &nbsp; <strong>D</strong> = Needs Support
      </div>
      <div className="card" style={{padding:0,overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead><tr>
            <th style={{background:'var(--teal)',color:'#fff',padding:'8px 14px',textAlign:'left',fontSize:11}}>Student</th>
            {subjects.map(s=><th key={s} style={{background:'var(--teal)',color:'#fff',padding:'8px 10px',fontSize:11}}>{s}</th>)}
            <th style={{background:'var(--teal)',color:'#fff',padding:'8px 10px',fontSize:11}}>Action</th>
          </tr></thead>
          <tbody>
            {MOCK_STUDENTS.map((s,ri)=>(
              <tr key={s.id} style={{background:ri%2?'var(--gray-l)':'#fff'}}>
                <td style={{padding:'8px 14px',fontWeight:700}}>{s.name}</td>
                {subjects.map(sub=>(
                  <td key={sub} style={{padding:'6px 8px',textAlign:'center'}}>
                    <select style={{width:52,padding:'4px 6px',border:'1.5px solid var(--gray-m)',borderRadius:6,fontFamily:'var(--ff)',fontSize:12,background:'transparent',textAlign:'center'}}
                      value={grades[s.id][sub]} onChange={e=>setG(s.id,sub,e.target.value)}>
                      <option value="">—</option>
                      {['A','B','C','D'].map(g=><option key={g}>{g}</option>)}
                    </select>
                  </td>
                ))}
                <td style={{padding:'6px 8px',textAlign:'center'}}>
                  <button className="btn btn-outline" style={{padding:'4px 10px',fontSize:10}} onClick={()=>show(`📄 Report card for ${s.name} ready (production)`)}>DOCX</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── PARENT COMMS TAB ── */
function CommTab({user,show}){
  const [subj,setSubj]=useState('');
  const [msg,setMsg]=useState('');
  const msgs=[
    {p:"Mrs. Al-Mansouri",preview:"Thank you for Aisha's progress update. She's been practising at home!",date:'29 Apr'},
    {p:'Mr. Hassan',preview:'Could you share the Tuesday homework sheet? Rania missed school.',date:'28 Apr'},
    {p:'Mrs. Al-Farsi',preview:'Yusuf loved the family activity! He drew his whole family tree.',date:'27 Apr'},
  ];
  return(
    <div>
      <div className="page-hdr">
        <div><div className="page-title">Parent Communication</div><div className="page-sub">Send newsletters, updates and messages to parents</div></div>
      </div>
      <div className="card">
        <div className="card-title">📨 New Message / Newsletter</div>
        <div className="fg"><label className="fl">Subject</label><input className="fi" placeholder="e.g. Week 18 Update – My Family Theme" value={subj} onChange={e=>setSubj(e.target.value)}/></div>
        <div className="fg"><label className="fl">Message</label><textarea className="fta" rows={4} placeholder="Dear Parents,&#10;This week we are learning about..." value={msg} onChange={e=>setMsg(e.target.value)}/></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
          <button className="btn btn-teal" onClick={()=>{show('📧 Newsletter sent to all 8 parents!');setSubj('');setMsg('');}}>Send to All Parents</button>
          <button className="btn btn-outline" onClick={async()=>{
            if(!subj&&!msg){show('Please fill subject and message','error');return;}
            show('⏳ Generating newsletter DOCX...','info');
            const f={...emptyForm(),teacherName:user.name,grade:user.grade,theme:subj||'Weekly Update',
              topic:'Parent Newsletter',month:'May 2025',subject:'General',objectives:[msg||'See newsletter'],
              dateFrom:'',dateTo:''};
            const buf=await generateDocx(f);
            saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'}),`Newsletter_${(subj||'Update').replace(/\s+/g,'_')}.docx`);
            show('✅ Newsletter DOCX ready!');
          }}>⬇ Export as DOCX</button>
          <button className="btn btn-gray" onClick={()=>show('☁ Saved to OneDrive /Newsletters/','info')}>☁ Save to OneDrive</button>
        </div>
      </div>
      <div className="card">
        <div className="card-title">💬 Recent Parent Messages</div>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'10px 0',borderBottom:i<msgs.length-1?'1px solid var(--gray-m)':'none'}}>
            <div style={{width:34,height:34,borderRadius:'50%',background:'var(--blue-l)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,color:'var(--blue)',fontSize:12,flexShrink:0}}>
              {m.p.split(' ').map(w=>w[0]).join('').slice(0,2)}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:800}}>{m.p}</div>
              <div style={{fontSize:11,color:'var(--gray)',marginTop:2}}>{m.preview}</div>
            </div>
            <div style={{fontSize:10,color:'var(--gray)',flexShrink:0}}>{m.date}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── SETTINGS TAB ── */
function SettingsTab({user,show}){
  const clearDraft=()=>{lsSet('bps_draft_'+user.initials,null);show('🧹 Draft cleared');};
  const clearAll=()=>{
    if(window.confirm('Clear ALL saved data? This cannot be undone.')){
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(LS_ATT);
      localStorage.removeItem(LS_GRADES);
      localStorage.removeItem('bps_draft_'+user.initials);
      show('🧹 All data cleared — refresh to start fresh');
    }
  };
  return(
    <div>
      <div className="page-hdr"><div><div className="page-title">Settings</div><div className="page-sub">App preferences and data management</div></div></div>
      <div className="card">
        <div className="card-title">👩‍🏫 Current Profile</div>
        <div className="g2">
          <div><div style={{fontSize:11,color:'var(--gray)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:4}}>Name</div><div style={{fontWeight:800}}>{user.name}</div></div>
          <div><div style={{fontSize:11,color:'var(--gray)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:4}}>Grade & Subject</div><div style={{fontWeight:800}}>Grade {user.grade} · {user.subject}</div></div>
        </div>
        <div style={{marginTop:12,fontSize:12,color:'var(--gray)',background:'var(--blue-l)',padding:'8px 12px',borderRadius:'var(--radius-sm)'}}>
          🔵 In production, your profile auto-fills from your Microsoft 365 account. No manual entry needed.
        </div>
      </div>
      <div className="card">
        <div className="card-title">💾 Data Storage</div>
        <p style={{fontSize:12,color:'var(--gray)',marginBottom:14,lineHeight:1.7}}>
          This demo saves your data in your browser's local storage. Data persists across page refreshes but is tied to this browser and device. In production, data is stored securely in the school's PostgreSQL database and OneDrive.
        </p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-amber" onClick={clearDraft}>🧹 Clear Draft Plan</button>
          <button className="btn btn-coral" onClick={clearAll}>⚠ Clear All Saved Data</button>
        </div>
      </div>
      <div className="card">
        <div className="card-title">🗺 Production Roadmap</div>
        {[
          {phase:'Phase 1',label:'Microsoft SSO Auth',desc:'Replace mock login with real Azure Entra ID',done:false},
          {phase:'Phase 2',label:'PostgreSQL Backend',desc:'Node.js API + Prisma ORM for persistent storage',done:false},
          {phase:'Phase 3',label:'Server DOCX Engine',desc:'docxtemplater on server for larger templates',done:false},
          {phase:'Phase 4',label:'OneDrive Integration',desc:'Real Microsoft Graph API file save + versioning',done:false},
          {phase:'Phase 5–9',label:'Attendance, Reports, Comms, Governance',desc:'Full production features',done:false},
        ].map((r,i)=>(
          <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid var(--gray-m)',alignItems:'flex-start'}}>
            <span className={`badge ${r.done?'badge-green':'badge-gray'}`} style={{flexShrink:0,marginTop:2}}>{r.done?'✓':r.phase}</span>
            <div>
              <div style={{fontWeight:800,fontSize:13}}>{r.label}</div>
              <div style={{fontSize:11,color:'var(--gray)',marginTop:2}}>{r.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const {toast,show}=useToast();

  if(!user)return<LoginPage onLogin={u=>setUser(u)}/>;

  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <Topbar user={user} onSignOut={()=>{setUser(null);setTab('dashboard');}}/>
      <div className="main-wrap">
        <Sidebar tab={tab} setTab={setTab}/>
        <div className="content-area">
          {tab==='dashboard'    &&<Dashboard user={user} setTab={setTab} show={show}/>}
          {tab==='plans'        &&<PlansTab user={user} show={show}/>}
          {tab==='worksheets'   &&<WorksheetsTab show={show}/>}
          {tab==='attendance'   &&<AttendanceTab show={show}/>}
          {tab==='reports'      &&<ReportsTab user={user} show={show}/>}
          {tab==='communication'&&<CommTab user={user} show={show}/>}
          {tab==='help'         &&<HelpTab/>}
          {tab==='settings'     &&<SettingsTab user={user} show={show}/>}
        </div>
      </div>
      <Toast toast={toast} onDone={()=>show(null)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
